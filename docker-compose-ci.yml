networks:
  dbnet:
    name: dbnet
    driver: bridge

services:
  db1:
    image: postgres:15
    container_name: db1
    environment:
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: pass1
      POSTGRES_DB: demo1
    ports:
      - "15432:5432"
    networks:
      - dbnet
    volumes:
      - ./docker/db1/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  db2:
    image: postgres:15
    container_name: db2
    environment:
      POSTGRES_USER: user2
      POSTGRES_PASSWORD: pass2
      POSTGRES_DB: demo2
    ports:
      - "15433:5432"
    networks:
      - dbnet
    volumes:
      - ./docker/db2/init.sql:/docker-entrypoint-initdb.d/init.sql:ro